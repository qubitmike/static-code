<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue知识导图 - 响应式浮动布局</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        #app {
            max-width: 100%;
            margin: 0 auto;
            position: relative;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: #3498db;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        .header p {
            font-size: 1.2rem;
            color: #7f8c8d;
        }
        /* 浮动控制按钮 */
        .floating-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        button {
            padding: 12px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        button i {
            font-size: 1.2rem;
        }
        .mindmap-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            overflow: hidden;
            padding: 25px;
            margin-bottom: 25px;
            width: 100%;
        }
        .svg-container {
            width: 100%;
            height: 75vh;
            min-height: 500px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #fff;
            overflow: hidden;
        }
        svg {
            width: 100%;
            height: 100%;
        }
        .node {
            cursor: move;
            user-select: none;
        }
        .node-rect {
            stroke: #2c3e50;
            stroke-width: 2;
            rx: 8;
            filter: drop-shadow(3px 3px 3px rgba(0,0,0,0.2));
            transition: all 0.3s;
        }
        .node-rect:hover {
            stroke-width: 3;
            filter: drop-shadow(4px 4px 5px rgba(0,0,0,0.25));
        }
        .node-text {
            font-size: 15px;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            font-weight: 600;
            fill: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .connection {
            stroke: #7f8c8d;
            stroke-width: 2.5;
            fill: none;
        }
        .node-buttons {
            display: flex;
            gap: 5px;
        }
        .node-button {
            width: 22px;
            height: 22px;
            cursor: pointer;
            text-anchor: middle;
            dominant-baseline: central;
            font-size: 14px;
            font-weight: bold;
            fill: white;
            rx: 11;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.3));
        }
        .add-button {
            fill: #27ae60;
        }
        .delete-button {
            fill: #c0392b;
        }
        /* 浮动提示信息 */
        .floating-tips {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 350px;
        }
        .floating-tips h3 {
            margin-bottom: 15px;
            color: #3498db;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .floating-tips ul {
            padding-left: 20px;
        }
        .floating-tips li {
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .color-preview {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        /* 响应式设计 */
        @media (max-width: 768px) {
            .floating-controls {
                top: 10px;
                right: 10px;
                left: 10px;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .floating-controls button {
                width: auto;
                flex: 1;
                min-width: 140px;
            }
            .floating-tips {
                bottom: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .header p {
                font-size: 1rem;
            }
            .svg-container {
                height: 60vh;
            }
        }
        @media (max-width: 480px) {
            .floating-controls {
                flex-direction: column;
            }
            .floating-controls button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- <div class="header"> -->
            <!-- <h1>Vue.js 知识导图</h1> -->
            <!-- <p>响应式浮动布局 - 根据屏幕大小自动调整</p> -->
        <!-- </div> -->

        <!-- 浮动控制按钮 -->
        <div class="floating-controls">
            <button @click="addRootNode">
                <i>+</i> 添加根节点
            </button>
            <button @click="addChildToSelected">
                <i>⊕</i> 添加子节点
            </button>
            <button @click="removeSelectedNode">
                <i>−</i> 删除节点
            </button>
            <button @click="collapseAll">
                <i>▲</i> 折叠所有
            </button>
            <button @click="expandAll">
                <i>▼</i> 展开所有
            </button>
            <button @click="resetLayout">
                <i>↺</i> 重置布局
            </button>
        </div>

        <div class="mindmap-container">
            <div class="svg-container">
                <svg ref="svg">
                    <!-- 连接线 -->
                    <g v-for="(conn, index) in connections" :key="'conn-'+index">
                        <path class="connection" :d="conn.path" />
                    </g>
                    
                    <!-- 节点 -->
                    <g v-for="node in nodes" :key="node.id" 
                       :transform="`translate(${node.x}, ${node.y})`"
                       class="node"
                       @mousedown="startDrag(node, $event)"
                       @mouseup="stopDrag"
                       @touchstart="startDrag(node, $event)"
                       @touchend="stopDrag">
                        <rect class="node-rect" 
                              :width="node.width" 
                              :height="node.height" 
                              :x="-node.width/2" 
                              :y="-node.height/2"
                              :fill="node.color" />
                        <text class="node-text">{{ node.text }}</text>
                        
                        <!-- 节点操作按钮 -->
                        <g v-if="node.id !== 'root'" transform="translate(45, -32)">
                            <rect class="node-button add-button" 
                                  width="22" height="22" rx="11"
                                  @click="addChildNode(node)" />
                            <text x="11" y="14" style="font-size: 16px;">+</text>
                        </g>
                        
                        <g v-if="node.id !== 'root'" transform="translate(45, 32)">
                            <rect class="node-button delete-button" 
                                  width="22" height="22" rx="11"
                                  @click="removeNode(node)" />
                            <text x="11" y="14" style="font-size: 16px;">-</text>
                        </g>
                    </g>
                </svg>
            </div>
        </div>

        <!-- 浮动提示信息 -->
        <div class="floating-tips">
            <h3>使用说明</h3>
            <ul>
                <li><span class="color-preview" :style="{backgroundColor: '#3498db'}"></span>拖动节点：可以移动节点位置</li>
                <li><span class="color-preview" :style="{backgroundColor: '#27ae60'}"></span>点击"+"按钮：添加子节点</li>
                <li><span class="color-preview" :style="{backgroundColor: '#c0392b'}"></span>点击"-"按钮：删除节点及其子节点</li>
                <li><span class="color-preview" :style="{backgroundColor: '#f39c12'}"></span>使用浮动按钮控制整体布局</li>
                <li><span class="color-preview" :style="{backgroundColor: '#9b59b6'}"></span>节点颜色随机生成，饱和度较高</li>
                <li><span class="color-preview" :style="{backgroundColor: '#1abc9c'}"></span>节点间距会根据屏幕大小动态调整</li>
            </ul>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch } = Vue;

        createApp({
            setup() {
                // 生成随机高饱和度颜色
                const generateVibrantColor = () => {
                    const hue = Math.floor(Math.random() * 360);
                    const saturation = 80 + Math.floor(Math.random() * 20); // 80-100%
                    const lightness = 40 + Math.floor(Math.random() * 20); // 40-60%
                    return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                };

                // 节点数据
                const nodes = ref([]);

                // 初始化节点
                const initNodes = () => {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    
                    return [
                        { 
                            id: 'root', 
                            text: 'Vue.js', 
                            x: centerX, 
                            y: centerY, 
                            width: 130, 
                            height: 45,
                            expanded: true,
                            color: '#3498db'
                        },
                        { 
                            id: 'node1', 
                            text: '响应式系统', 
                            x: centerX - 200, 
                            y: centerY - 120, 
                            width: 130, 
                            height: 45,
                            parent: 'root',
                            expanded: true,
                            color: generateVibrantColor()
                        },
                        { 
                            id: 'node2', 
                            text: '组件系统', 
                            x: centerX, 
                            y: centerY - 120, 
                            width: 130, 
                            height: 45,
                            parent: 'root',
                            expanded: true,
                            color: generateVibrantColor()
                        },
                        { 
                            id: 'node3', 
                            text: '模板语法', 
                            x: centerX + 200, 
                            y: centerY - 120, 
                            width: 130, 
                            height: 45,
                            parent: 'root',
                            expanded: true,
                            color: generateVibrantColor()
                        },
                        { 
                            id: 'node4', 
                            text: 'Ref & Reactive', 
                            x: centerX - 300, 
                            y: centerY - 200, 
                            width: 150, 
                            height: 45,
                            parent: 'node1',
                            expanded: true,
                            color: generateVibrantColor()
                        },
                        { 
                            id: 'node5', 
                            text: 'Computed', 
                            x: centerX - 150, 
                            y: centerY - 200, 
                            width: 130, 
                            height: 45,
                            parent: 'node1',
                            expanded: true,
                            color: generateVibrantColor()
                        },
                        { 
                            id: 'node6', 
                            text: '单文件组件', 
                            x: centerX - 100, 
                            y: centerY - 200, 
                            width: 150, 
                            height: 45,
                            parent: 'node2',
                            expanded: true,
                            color: generateVibrantColor()
                        },
                        { 
                            id: 'node7', 
                            text: 'Props & Events', 
                            x: centerX + 50, 
                            y: centerY - 200, 
                            width: 160, 
                            height: 45,
                            parent: 'node2',
                            expanded: true,
                            color: generateVibrantColor()
                        },
                        { 
                            id: 'node8', 
                            text: '指令', 
                            x: centerX + 150, 
                            y: centerY - 200, 
                            width: 130, 
                            height: 45,
                            parent: 'node3',
                            expanded: true,
                            color: generateVibrantColor()
                        },
                        { 
                            id: 'node9', 
                            text: '插值', 
                            x: centerX + 300, 
                            y: centerY - 200, 
                            width: 130, 
                            height: 45,
                            parent: 'node3',
                            expanded: true,
                            color: generateVibrantColor()
                        }
                    ];
                };

                // 初始化节点
                nodes.value = initNodes();

                // 计算连接线
                const connections = computed(() => {
                    const conns = [];
                    nodes.value.forEach(node => {
                        if (node.parent) {
                            const parent = nodes.value.find(n => n.id === node.parent);
                            if (parent) {
                                // 计算贝塞尔曲线路径
                                const dx = node.x - parent.x;
                                const dy = node.y - parent.y;
                                const cpX1 = parent.x + dx * 0.5;
                                const cpY1 = parent.y;
                                const cpX2 = parent.x + dx * 0.5;
                                const cpY2 = node.y;
                                
                                conns.push({
                                    path: `M${parent.x},${parent.y} C${cpX1},${cpY1} ${cpX2},${cpY2} ${node.x},${node.y}`
                                });
                            }
                        }
                    });
                    return conns;
                });

                // 动态调整节点间距
                const adjustNodeSpacing = () => {
                    const screenWidth = window.innerWidth;
                    const screenHeight = window.innerHeight;
                    const spacingFactor = Math.max(0.7, Math.min(1.5, screenWidth / 1200));
                    
                    // 更新中心位置
                    const centerX = screenWidth / 2;
                    const centerY = screenHeight / 2;
                    
                    // 更新根节点位置
                    const rootNode = nodes.value.find(n => n.id === 'root');
                    if (rootNode) {
                        rootNode.x = centerX;
                        rootNode.y = centerY;
                    }
                    
                    // 更新其他节点位置
                    nodes.value.forEach(node => {
                        if (node.parent) {
                            const parent = nodes.value.find(n => n.id === node.parent);
                            if (parent) {
                                // 根据父节点ID确定水平偏移方向
                                const parentIndex = nodes.value.findIndex(n => n.id === node.parent);
                                const childIndex = nodes.value.findIndex(n => n.id === node.id);
                                const offsetDirection = childIndex % 2 === 0 ? -1 : 1;
                                
                                // 调整节点位置
                                node.x = parent.x + offsetDirection * 200 * spacingFactor;
                                node.y = parent.y + 120 * spacingFactor;
                            }
                        }
                    });
                };

                // 拖拽功能
                let dragging = false;
                let dragNode = null;
                let startX = 0;
                let startY = 0;

                const startDrag = (node, event) => {
                    dragging = true;
                    dragNode = node;
                    
                    // 处理鼠标和触摸事件
                    if (event.type === 'mousedown') {
                        startX = event.clientX;
                        startY = event.clientY;
                    } else if (event.type === 'touchstart') {
                        startX = event.touches[0].clientX;
                        startY = event.touches[0].clientY;
                    }
                    
                    event.preventDefault();
                };

                const onDrag = (event) => {
                    if (!dragging || !dragNode) return;
                    
                    let clientX, clientY;
                    if (event.type === 'mousemove') {
                        clientX = event.clientX;
                        clientY = event.clientY;
                    } else if (event.type === 'touchmove') {
                        clientX = event.touches[0].clientX;
                        clientY = event.touches[0].clientY;
                    }
                    
                    const dx = clientX - startX;
                    const dy = clientY - startY;
                    
                    dragNode.x += dx;
                    dragNode.y += dy;
                    
                    startX = clientX;
                    startY = clientY;
                };

                const stopDrag = () => {
                    dragging = false;
                    dragNode = null;
                };

                // 添加事件监听
                onMounted(() => {
                    window.addEventListener('mousemove', onDrag);
                    window.addEventListener('touchmove', onDrag);
                    window.addEventListener('mouseup', stopDrag);
                    window.addEventListener('touchend', stopDrag);
                    
                    // 初始调整节点间距
                    adjustNodeSpacing();
                    
                    // 监听窗口大小变化
                    window.addEventListener('resize', adjustNodeSpacing);
                });

                // 添加子节点
                const addChildNode = (parentNode) => {
                    const newNodeId = 'node' + (nodes.value.length + 1);
                    const newNode = {
                        id: newNodeId,
                        text: '新节点',
                        x: parentNode.x,
                        y: parentNode.y + 120,
                        width: 110,
                        height: 45,
                        parent: parentNode.id,
                        expanded: true,
                        color: generateVibrantColor()
                    };
                    nodes.value.push(newNode);
                    
                    // 调整节点布局
                    adjustNodeSpacing();
                };

                // 添加根节点
                const addRootNode = () => {
                    const newNodeId = 'node' + (nodes.value.length + 1);
                    const screenWidth = window.innerWidth;
                    const screenHeight = window.innerHeight;
                    
                    const newNode = {
                        id: newNodeId,
                        text: '新根节点',
                        x: Math.random() * (screenWidth - 200) + 100,
                        y: Math.random() * (screenHeight - 200) + 100,
                        width: 130,
                        height: 45,
                        expanded: true,
                        color: generateVibrantColor()
                    };
                    nodes.value.push(newNode);
                };

                // 添加子节点到选中节点
                const addChildToSelected = () => {
                    if (nodes.value.length > 0) {
                        const randomParent = nodes.value[Math.floor(Math.random() * nodes.value.length)];
                        addChildNode(randomParent);
                    }
                };

                // 删除节点
                const removeNode = (node) => {
                    // 递归删除所有子节点
                    const removeChildren = (nodeId) => {
                        const children = nodes.value.filter(n => n.parent === nodeId);
                        children.forEach(child => {
                            removeChildren(child.id);
                        });
                        nodes.value = nodes.value.filter(n => n.id !== nodeId);
                    };
                    
                    removeChildren(node.id);
                };

                // 删除选中节点
                const removeSelectedNode = () => {
                    if (nodes.value.length > 1) {
                        const randomIndex = Math.floor(Math.random() * (nodes.value.length - 1)) + 1;
                        removeNode(nodes.value[randomIndex]);
                    }
                };

                // 折叠/展开所有节点
                const collapseAll = () => {
                    nodes.value.forEach(node => {
                        node.expanded = false;
                    });
                };

                const expandAll = () => {
                    nodes.value.forEach(node => {
                        node.expanded = true;
                    });
                };

                // 重置布局
                const resetLayout = () => {
                    nodes.value = initNodes();
                    
                    // 调整节点布局
                    setTimeout(adjustNodeSpacing, 100);
                };

                return {
                    nodes,
                    connections,
                    startDrag,
                    stopDrag,
                    addChildNode,
                    addRootNode,
                    addChildToSelected,
                    removeNode,
                    removeSelectedNode,
                    collapseAll,
                    expandAll,
                    resetLayout
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
