<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workbooks and Computed Formulas Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .section {
            flex: 1;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
        }
        .item {
            margin-bottom: 10px;
            padding: 8px;
            background-color: #f9f9f9;
            cursor: pointer;
        }
        .item:hover {
             background-color: #f0f0f0;
        }
        .item-header {
            font-weight: bold;
            color: #333;
        }
        .item-details {
            margin-left: 15px;
            display: none; /* 默认隐藏 */
        }
        .item.expanded > .item-details {
            display: block;
        }
        .formula-item {
            font-family: monospace;
            background-color: #f0f8ff;
            padding: 2px 4px;
            border-radius: 2px;
            display: inline-block;
            margin: 2px 0;
        }
        .modal {
            display: none; /* 默认隐藏 */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5); /* 半透明背景 */
        }
        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 5px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover,
        .close:focus {
            color: black;
        }
        .tooltip {
            visibility: hidden;
            opacity: 0;
            background-color: #555;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 5px;
            position: absolute;
            z-index: 1001;
            bottom: 125%; /* 在元素上方 */
            left: 50%;
            transform: translateX(-50%);
            transition: opacity 0.3s;
            font-size: 12px;
            white-space: nowrap;
        }
        .has-tooltip:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

    </style>
</head>
<body>

<h1>Excel 扫描配置与公式详情</h1>

<div class="container">
    <div class="section">
        <h2>ScanWorkbookParam 列表 (workbookList)</h2>
        <div id="workbook-container"></div>
    </div>

    <div class="section">
        <h2>CompHeadFormula 列表 (compList)</h2>
        <div id="comp-container"></div>
    </div>
</div>

<!-- Modal -->
<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <pre id="modal-text">Modal content will appear here...</pre>
    </div>
</div>

<script>
    // --- 示例数据 ---
    const workbookList = [
    ];

    const compList = [];
    // --- /示例数据 ---

    const modal = document.getElementById('myModal');
    const modalText = document.getElementById('modal-text');
    const span = document.getElementsByClassName("close")[0];

    // 关闭模态框
    span.onclick = function() {
        modal.style.display = "none";
    }
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }

    // 通用函数：创建可展开的项目
    function createExpandableItem(title, details, isFormula = false) {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item';

        const headerDiv = document.createElement('div');
        headerDiv.className = 'item-header';
        if(isFormula) {
             headerDiv.classList.add('has-tooltip'); // 添加tooltip类
             const tooltip = document.createElement('span');
             tooltip.className = 'tooltip';
             tooltip.textContent = details.headFormula || details.desc || 'No formula'; // 悬浮提示内容
             headerDiv.appendChild(tooltip);
        }
        headerDiv.textContent = title;
        headerDiv.addEventListener('click', () => {
            itemDiv.classList.toggle('expanded');
        });
        headerDiv.addEventListener('dblclick', (e) => {
            e.stopPropagation(); // 防止触发点击展开
            modalText.textContent = JSON.stringify(details, null, 2); // 显示完整对象
            modal.style.display = "block";
        });

        itemDiv.appendChild(headerDiv);

        const detailsDiv = document.createElement('div');
        detailsDiv.className = 'item-details';

        // 渲染详细信息
        for (const [key, value] of Object.entries(details)) {
            if (Array.isArray(value) && value.length > 0) {
                // 如果是数组且非空，则递归渲染
                const subHeader = document.createElement('div');
                subHeader.className = 'item-header';
                subHeader.textContent = `${key}:`;
                detailsDiv.appendChild(subHeader);

                const subContainer = document.createElement('div');
                subContainer.style.marginLeft = '15px';
                value.forEach(item => {
                    let subTitle = typeof item === 'object' ? item.desc || item.headShow || item.functionNameShow || 'Object Item' : item.toString();
                    let subDetails = typeof item === 'object' ? item : {value: item};
                    subContainer.appendChild(createExpandableItem(subTitle, subDetails));
                });
                detailsDiv.appendChild(subContainer);
            } else if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                // 如果是对象但不是数组，则递归渲染
                const subHeader = document.createElement('div');
                subHeader.className = 'item-header';
                subHeader.textContent = `${key}:`;
                detailsDiv.appendChild(subHeader);

                const subContainer = document.createElement('div');
                subContainer.style.marginLeft = '15px';
                subContainer.appendChild(createExpandableItem('(Object)', value));
                detailsDiv.appendChild(subContainer);
            } else if(key !== 'desc' && key !== 'headShow' && key !== 'functionNameShow') { // 避免重复显示基本信息
                // 如果是基本类型，则直接显示
                const p = document.createElement('p');
                p.innerHTML = `<strong>${key}:</strong> ${isFormula && key === 'headFormulaShow' ? `<span class="formula-item">${value}</span>` : value}`;
                detailsDiv.appendChild(p);
            }
        }

        itemDiv.appendChild(detailsDiv);
        return itemDiv;
    }

    // 渲染 workbookList
    const workbookContainer = document.getElementById('workbook-container');
    workbookList.forEach((workbook, index) => {
        const wbTitle = `Workbook ${index + 1}`;
        const wbItem = createExpandableItem(wbTitle, workbook);
        workbookContainer.appendChild(wbItem);
    });

    // 渲染 compList
    const compContainer = document.getElementById('comp-container');
    compList.forEach((comp, index) => {
        const compTitle = `${comp.functionNameShow} (Sort: ${comp.sortNum})`;
        const compItem = createExpandableItem(compTitle, comp);
        compContainer.appendChild(compItem);
    });

</script>

</body>
</html>
